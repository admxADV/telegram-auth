<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - TREND</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .admin-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .admin-header p {
            opacity: 0.9;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            margin-top: 16px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .users-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e1e4e8;
        }

        .users-header h2 {
            font-size: 20px;
            color: #1a1a1a;
        }

        .users-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .user-card {
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            cursor: pointer;
            transition: background 0.3s;
        }

        .user-header:hover {
            background: #f0f2f5;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .user-username {
            font-size: 13px;
            color: #666;
        }

        .user-stats {
            display: flex;
            gap: 16px;
        }

        .stat-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .stat-badge.tests {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .stat-badge.progress {
            background: #e3f2fd;
            color: #1565c0;
        }

        .stat-badge.unread {
            background: #ffebee;
            color: #c62828;
            font-weight: bold;
        }

        .expand-icon {
            transition: transform 0.3s;
        }

        .expand-icon.expanded {
            transform: rotate(180deg);
        }

        .user-actions {
            display: flex;
            gap: 8px;
            margin-left: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .chat-btn {
            background: #e3f2fd;
            color: #1565c0;
        }

        .chat-btn:hover {
            background: #bbdefb;
        }

        .test-btn {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .test-btn:hover {
            background: #e1bee7;
        }

        .user-details {
            display: none;
            padding: 16px;
            border-top: 1px solid #e1e4e8;
        }

        .user-details.visible {
            display: block;
        }

        .detail-section {
            margin-bottom: 16px;
        }

        .detail-section h4 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .test-result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .test-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .test-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .test-progress {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .test-answers {
            font-size: 13px;
            color: #666;
        }

        .test-answers p {
            margin-bottom: 4px;
        }

        /* Chat section for admin */
        .chat-section {
            margin-top: 16px;
            border-top: 1px solid #e1e4e8;
            padding-top: 16px;
        }

        .chat-section h4 {
            font-size: 14px;
            color: #1a1a1a;
            margin: 0 0 12px 0;
        }

        .admin-chat-messages {
            max-height: 150px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .admin-chat-msg {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .admin-chat-msg.sent {
            background: #e1e4e8;
            color: #1a1a1a;
            margin-right: 20px;
        }

        .admin-chat-msg.received {
            background: #667eea;
            color: white;
            margin-left: 20px;
        }

        .admin-chat-input {
            display: flex;
            gap: 8px;
        }

        .admin-chat-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            font-size: 12px;
        }

        .admin-chat-input button {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .admin-chat-input button:hover {
            background: #5a6fd6;
        }

        .chat-no-messages {
            text-align: center;
            padding: 10px;
            color: #999;
            font-size: 12px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5a6fd6;
        }

        @media (max-width: 768px) {
            .user-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .user-stats {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

        const testNames = {
            '1': 'Тест 1: Отдел и Должность',
            '2': 'Тест 2: Общие вопросы',

        };

        async function loadUsers() {
            const container = document.getElementById('users-list');
            const countEl = document.getElementById('users-count');
            
            container.innerHTML = '<div class="loading">Загрузка...</div>';

            try {
                // Check if user is admin - temporarily disabled for testing
                // const userId = sessionStorage.getItem('user_id');
                // const adminIds = ['5093303797', '7579436'];
                // 
                // if (!userId || !adminIds.includes(userId)) {
                //     document.getElementById('users-container').innerHTML = '<div class="error">Доступ запрещен</div>';
                //     return;
                // }

                const response = await fetch('/api/admin/users');
                
                if (!response.ok) {
                    const errorData = await response.json();
                    container.innerHTML = '<div class="error">' + (errorData.error || 'Ошибка доступа') + '</div>';
                    return;
                }
                
                const users = await response.json();

                if (users.length === 0) {
                    container.innerHTML = '<div class="no-results">Нет пользователей</div>';
                    countEl.textContent = '0';
                    return;
                }

                countEl.textContent = users.length;
                
                container.innerHTML = users.map(user => `
                    <div class="user-card">
                        <div class="user-header" onclick="toggleDetails('${user.telegramId}')">
                            <div class="user-info">
                                <div class="user-avatar">${user.firstName ? user.firstName[0].toUpperCase() : 'U'}</div>
                                <div>
                                    <div class="user-name">${user.firstName || 'Пользователь'}</div>
                                    <div class="user-username">@${user.username || 'unknown'}</div>
                                </div>
                            </div>
                            <div class="user-stats">
                                ${user.unreadCount > 0 ? `<span class="stat-badge unread">${user.unreadCount} новых</span>` : ''}
                                <span class="stat-badge tests">${user.results.length} тестов</span>
                                <span class="stat-badge progress">${getAverageProgress(user.results)}%</span>
                                <div class="user-actions">
                                    <button class="action-btn chat-btn" onclick="openChat('${user.telegramId}'); event.stopPropagation();">💬 Чат</button>
                                    <button class="action-btn test-btn" onclick="openTestResults('${user.telegramId}'); event.stopPropagation();">📝 Тест</button>
                                </div>
                                <span class="expand-icon" id="icon-${user.telegramId}">▼</span>
                            </div>
                        </div>
                        <div class="user-details" id="details-${user.telegramId}">
                            <div class="detail-section">
                                <h4>Информация о пользователе</h4>
                                <p><strong>Telegram ID:</strong> ${user.telegramId}</p>
                                <p><strong>Имя:</strong> ${user.firstName || user.username || 'не указано'}</p>
                                <p><strong>Username:</strong> ${user.username ? '@' + user.username : 'не указан'}</p>
                                <p><strong>Дата регистрации:</strong> ${formatDate(user.createdAt)}</p>
                            </div>
                            
                            <div class="detail-section">
                                <h4>Результаты тестов</h4>
                                ${user.results.length === 0 ? '<p>Нет результатов</p>' : ''}
                                ${user.results.map(r => `
                                    <div class="test-result">
                                        <div class="test-result-header">
                                            <span class="test-name">${testNames[r.testId] || 'Тест ' + r.testId}</span>
                                            <span class="test-progress">${r.progress}%</span>
                                        </div>
                                        <div class="test-answers">
                                            ${formatAnswers(r.answers, r.testId)}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div class="chat-section">
                                <h4>Чат с пользователем</h4>
                                <div class="admin-chat-messages" id="chat-messages-${user.telegramId}">
                                    <div class="chat-no-messages">Загрузка сообщений...</div>
                                </div>
                                <div class="admin-chat-input">
                                    <input type="text" id="chat-input-${user.telegramId}" placeholder="Введите сообщение..." onkeypress="handleChatKeyPress(event, '${user.telegramId}')">
                                    <button onclick="sendAdminMessage('${user.telegramId}')">Отправить</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error loading users:', error);
                console.error('Response status:', response?.status);
                console.error('Response text:', response?.statusText);
                container.innerHTML = '<div class="no-results">Ошибка загрузки данных</div>';
            }
        }

        function toggleDetails(telegramId) {
            const details = document.getElementById('details-' + telegramId);
            const icon = document.getElementById('icon-' + telegramId);
            
            if (details.classList.contains('visible')) {
                details.classList.remove('visible');
                icon.classList.remove('expanded');
                // Stop auto-refresh when collapsing
                stopChatRefresh();
            } else {
                details.classList.add('visible');
                icon.classList.add('expanded');
                // Load chat messages when expanding
                loadChatMessagesForUser(telegramId);
                // Start auto-refresh
                startChatRefresh(telegramId);
            }
        }

        function openChat(telegramId) {
            // Отправляем напоминание пользователю
            fetch('/api/admin/send-reminder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: telegramId, type: 'chat' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Напоминание отправлено пользователю!');
                }
            })
            .catch(err => console.error('Ошибка:', err));
            
            // Expand if not visible
            const details = document.getElementById('details-' + telegramId);
            const icon = document.getElementById('icon-' + telegramId);
            
            if (!details.classList.contains('visible')) {
                details.classList.add('visible');
                icon.classList.add('expanded');
                loadChatMessagesForUser(telegramId);
                startChatRefresh(telegramId);
            }
            
            // Scroll to chat section
            const chatSection = details.querySelector('.chat-section');
            if (chatSection) {
                chatSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function openTestResults(telegramId) {
            // Отправляем напоминание пользователю
            fetch('/api/admin/send-reminder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegramId: telegramId, type: 'test' })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('Напоминание отправлено пользователю!');
                }
            })
            .catch(err => console.error('Ошибка:', err));
            
            // Expand if not visible
            const details = document.getElementById('details-' + telegramId);
            const icon = document.getElementById('icon-' + telegramId);
            
            if (!details.classList.contains('visible')) {
                details.classList.add('visible');
                icon.classList.add('expanded');
                loadChatMessagesForUser(telegramId);
                startChatRefresh(telegramId);
            }
            
            // Scroll to test results section
            const testSection = details.querySelector('.detail-section:nth-of-type(2)');
            if (testSection) {
                testSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function getAverageProgress(results) {
            if (results.length === 0) return 0;
            const sum = results.reduce((acc, r) => acc + r.progress, 0);
            return Math.round(sum / results.length);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'неизвестно';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatAnswers(answers, testId) {
            if (!answers) return 'Нет ответов';
            
            const entries = Object.entries(answers);
            if (entries.length === 0) return 'Нет ответов';
            
            const questions = TEST_QUESTIONS[testId] || [];
            const questionMap = {};
            questions.forEach(q => { questionMap[q.id] = q; });
            
            return entries.map(([questionId, answer]) => {
                const question = questionMap[questionId];
                const questionText = question ? question.text : 'Вопрос ' + questionId;
                
                let answerText = answer;
                if (question && question.options) {
                    const option = question.options.find(o => o.value === answer);
                    answerText = option ? option.label : (answer || 'нет ответа');
                }
                
                return `<p><strong>"${questionText}"</strong>: ${answerText || 'нет ответа'}</p>`;
            }).join('');
        }

        // Chat functions for admin
        async function loadChatMessagesForUser(telegramId) {
            const container = document.getElementById('chat-messages-' + telegramId);
            if (!container) return;
            
            try {
                const response = await fetch(`/api/chat/messages?userId=${telegramId}`);
                const messages = await response.json();
                
                if (!messages || messages.length === 0) {
                    container.innerHTML = '<div class="chat-no-messages">Нет сообщений</div>';
                    return;
                }
                
                container.innerHTML = messages.map(msg => `
                    <div class="admin-chat-msg ${msg.type}">
                        ${msg.text}
                    </div>
                `).join('');
                
                container.scrollTop = container.scrollHeight;
            } catch (error) {
                console.error('Error loading chat messages:', error);
                container.innerHTML = '<div class="chat-no-messages">Ошибка загрузки</div>';
            }
        }

        async function sendAdminMessage(telegramId) {
            console.log('sendAdminMessage called with:', telegramId);
            const input = document.getElementById('chat-input-' + telegramId);
            console.log('Input element:', input);
            if (!input) {
                console.error('Input not found for id: chat-input-' + telegramId);
                return;
            }
            const message = input.value.trim();
            console.log('Message:', message);
            
            if (!message) return;
            
            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: telegramId,
                        text: message,
                        type: 'received' // Admin sends - user receives
                    })
                });
                console.log('Response:', response);
                
                if (response.ok) {
                    input.value = '';
                    loadChatMessagesForUser(telegramId);
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        }

        function handleChatKeyPress(event, telegramId) {
            if (event.key === 'Enter') {
                sendAdminMessage(telegramId);
            }
        }

        // Make functions global
        window.sendAdminMessage = async function(telegramId) {
            const input = document.getElementById('chat-input-' + telegramId);
            if (!input) return;
            
            const message = input.value.trim();
            if (!message) return;
            
            try {
                const response = await fetch('/api/chat/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: telegramId,
                        text: message,
                        type: 'received'
                    })
                });
                
                if (response.ok) {
                    input.value = '';
                    loadChatMessagesForUser(telegramId);
                }
            } catch (error) {
                console.error('Error sending message:', error);
            }
        };
        
        window.handleChatKeyPress = function(event, telegramId) {
            if (event.key === 'Enter') {
                window.sendAdminMessage(telegramId);
            }
        };

        // Auto-refresh chat messages every 3 seconds
        let chatRefreshInterval = null;
        
        function startChatRefresh(telegramId) {
            // Clear any existing interval
            if (chatRefreshInterval) {
                clearInterval(chatRefreshInterval);
            }
            // Refresh chat every 3 seconds
            chatRefreshInterval = setInterval(() => {
                loadChatMessagesForUser(telegramId);
            }, 3000);
        }
        
        function stopChatRefresh() {
            if (chatRefreshInterval) {
                clearInterval(chatRefreshInterval);
                chatRefreshInterval = null;
            }
        }

        // Load users on page load
        document.addEventListener('DOMContentLoaded', loadUsers);
    </script>
</body>
</html>
