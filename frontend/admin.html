<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - TREND</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }

        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .admin-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .admin-header p {
            opacity: 0.9;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            margin-top: 16px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .users-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e1e4e8;
        }

        .users-header h2 {
            font-size: 20px;
            color: #1a1a1a;
        }

        .users-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .user-card {
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            cursor: pointer;
            transition: background 0.3s;
        }

        .user-header:hover {
            background: #f0f2f5;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        .user-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .user-username {
            font-size: 13px;
            color: #666;
        }

        .user-stats {
            display: flex;
            gap: 16px;
        }

        .stat-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
        }

        .stat-badge.tests {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .stat-badge.progress {
            background: #e3f2fd;
            color: #1565c0;
        }

        .stat-badge.unread {
            background: #ffebee;
            color: #c62828;
            font-weight: bold;
        }

        .expand-icon {
            transition: transform 0.3s;
        }

        .expand-icon.expanded {
            transform: rotate(180deg);
        }

        .user-actions {
            display: flex;
            gap: 8px;
            margin-left: 8px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .chat-btn {
            background: #e3f2fd;
            color: #1565c0;
        }

        .chat-btn:hover {
            background: #bbdefb;
        }

        .test-btn {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .test-btn:hover {
            background: #e1bee7;
        }

        .user-details {
            display: none;
            padding: 16px;
            border-top: 1px solid #e1e4e8;
        }

        .user-details.visible {
            display: block;
        }

        .detail-section {
            margin-bottom: 16px;
        }

        .detail-section h4 {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .test-result {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .test-result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .test-name {
            font-weight: 600;
            color: #1a1a1a;
        }

        .test-progress {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .test-answers {
            font-size: 13px;
            color: #666;
        }

        .test-answers p {
            margin-bottom: 4px;
        }

        /* Chat section for admin */
        .chat-section {
            margin-top: 16px;
            border-top: 1px solid #e1e4e8;
            padding-top: 16px;
        }

        .chat-section h4 {
            font-size: 14px;
            color: #1a1a1a;
            margin: 0 0 12px 0;
        }

        .admin-chat-messages {
            max-height: 150px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
        }

        .admin-chat-msg {
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .admin-chat-msg.sent {
            background: #e1e4e8;
            color: #1a1a1a;
            margin-right: 20px;
        }

        .admin-chat-msg.received {
            background: #667eea;
            color: white;
            margin-left: 20px;
        }

        .admin-chat-input {
            display: flex;
            gap: 8px;
        }

        .admin-chat-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            font-size: 12px;
        }

        .admin-chat-input button {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .admin-chat-input button:hover {
            background: #5a6fd6;
        }

        .chat-no-messages {
            text-align: center;
            padding: 10px;
            color: #999;
            font-size: 12px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #5a6fd6;
        }

        @media (max-width: 768px) {
            .user-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .user-stats {
                width: 100%;
                justify-content: space-between;
            }
        }

        /* PRO Tab Styles */
        .admin-tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            margin-bottom: 24px;
        }

        .admin-tab {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .admin-tab:hover {
            background: rgba(255,255,255,0.3);
        }

        .admin-tab.active {
            background: white;
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .pro-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .pro-container h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .position-card {
            border: 1px solid #e1e4e8;
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #f8f9fa;
            cursor: pointer;
            transition: background 0.3s;
        }

        .position-header:hover {
            background: #f0f2f5;
        }

        .position-title {
            font-weight: 600;
            color: #1a1a1a;
        }

        .position-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .position-details {
            display: none;
            padding: 16px;
        }

        .position-details.visible {
            display: block;
        }

        .answer-group {
            margin-bottom: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .answer-group h4 {
            font-size: 14px;
            color: #1a1a1a;
            margin-bottom: 12px;
        }

        .answer-item {
            padding: 8px;
            background: white;
            border-left: 3px solid #e1e4e8;
            margin-bottom: 8px;
            font-size: 13px;
            color: #333;
        }

        .structure-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }

        .structure-btn:hover {
            background: #5a6fd6;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>Админ панель</h1>
        <p>Все пользователи и их результаты тестов</p>
        <a href="/dashboard.html" class="back-link">
            ← Вернуться к тестам
        </a>
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('users')">👥 Пользователи</button>
            <button class="admin-tab" onclick="switchTab('pro')">🚀 PRO</button>
        </div>
    </div>

    <!-- Tab: Users -->
    <div id="tab-users" class="tab-content active">
        <div class="users-container">
            <div class="users-header">
                <h2>Пользователи</h2>
                <div style="display: flex; align-items: center; gap: 16px;">
                    <span class="users-count" id="users-count">0</span>
                    <button class="refresh-btn" onclick="loadUsers()">Обновить</button>
                </div>
            </div>

            <div id="users-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Tab: PRO -->
    <div id="tab-pro" class="tab-content">
        <div class="pro-container">
            <h2>Аналитика по должностям</h2>
            <div id="pro-list">Загрузка данных...</div>

        function getAverageProgress(results) {
            if (results.length === 0) return 0;
            const sum = results.reduce((acc, r) => acc + r.progress, 0);
            return Math.round(sum / results.length);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'неизвестно';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatAnswers(answers, testId) {
            if (!answers) return 'Нет ответов';

            const entries = Object.entries(answers);
            if (entries.length === 0) return 'Нет ответов';

            // Приводим testId к строке для совместимости
            const testIdStr = String(testId);
            const questions = TEST_QUESTIONS[testIdStr] || TEST_QUESTIONS[testId] || [];
            const questionMap = {};
            questions.forEach(q => { questionMap[q.id] = q; });

            return entries.map(([questionId, answer]) => {
                const question = questionMap[questionId];
                const questionText = question ? question.text : 'Вопрос ' + questionId;

                let answerText = answer;
                
                // Если это кастомная должность - показываем реальное значение
                if (questionId === 'position_custom' && answer) {
                    answerText = answer;
                }
                // Если это выбор должности и выбрано "other" - проверяем есть ли кастомное значение
                else if (questionId === 'position_select' && answer === 'other' && answers.position_custom) {
                    answerText = answers.position_custom + ' (свой вариант)';
                }
                // Если это кастомные системы - показываем реальное значение
                else if (questionId === 'systems_custom' && answer) {
                    answerText = answer;
                }
                // Если это выбор систем и выбрано "custom" - проверяем есть ли кастомное значение
                else if (questionId === 'systems' && Array.isArray(answer) && answer.includes('custom') && answers.systems_custom) {
                    // Заменяем 'custom' на реальное значение
                    const customIndex = answer.indexOf('custom');
                    if (customIndex > -1) {
                        answer = [...answer];
                        answer[customIndex] = answers.systems_custom + ' (свои варианты)';
                    }
                    answerText = answer.map(val => {
                        if (question && question.options) {
                            const option = question.options.find(o => o.value === val);
                            return option ? option.label : val;
                        }
                        return val;
                    }).join(', ');
                }
                // Если есть options - ищем label
                else if (question && question.options) {
                    if (Array.isArray(answer)) {
                        // Мультиселект
                        answerText = answer.map(val => {
                            const option = question.options.find(o => o.value === val);
                            return option ? option.label : val;
                        }).join(', ');
                    } else {
                        // Селект или радио
                        const option = question.options.find(o => o.value === answer);
                        answerText = option ? option.label : (answer || 'нет ответа');
                    }
                }

                return `<p><strong>"${questionText}"</strong>: ${answerText || 'нет ответа'}</p>`;
            }).join('');
        }

                container.innerHTML = messages.map(msg => `

                container.scrollTop = container.scrollHeight;

                container.innerHTML = '<div class="chat-no-messages">Ошибка загрузки</div>';

        }

            chatRefreshInterval = setInterval(() => {

                    advertising_manager: 'Рекламный менеджер',
                    administrator: 'Администратор',
                    hr_manager: 'HR менеджер',
                    accountant: 'Бухгалтер',
                    clerk: 'Делопроизводитель',
                    business_trainer: 'Бизнес-тренер',
                    analyst: 'Аналитик',
                    photographer: 'Фотограф',
                    other: 'Другое'
                };

                let html = '';
                for (const [position, users] of Object.entries(positions)) {
                    // Если есть кастомное название — используем его
                    const name = customPositions[position] || positionNames[position] || position;
                    html += renderPositionCard(position, name, users);
                }

                proList.innerHTML = html || '<div class="no-results">Нет данных</div>';
            } catch (error) {
                console.error('Error loading PRO data:', error);
                proList.innerHTML = '<div class="no-results">Ошибка загрузки данных</div>';
            }
        }

        function renderPositionCard(position, name, users) {
            // Collect answers for daily_routine (question 3 in test 1)
            const answers = [];
            users.forEach(user => {
                const test1 = user.results && user.results[0];
                if (test1 && test1.answers && test1.answers.daily_routine) {
                    answers.push({
                        username: user.firstName || user.username || 'Аноним',
                        answer: test1.answers.daily_routine
                    });
                }
            });

            let answersHTML = '';
            if (answers.length > 0) {
                answersHTML = '<div class="answer-group"><h4>Ответы на вопрос: Распишите типичный рабочий день</h4>';
                answers.forEach((item, index) => {
                    answersHTML += `<div class="answer-item"><strong>${index + 1}. ${item.username}:</strong> ${item.answer}</div>`;
                });
                answersHTML += '</div>';
            } else {
                answersHTML = '<div class="answer-item">Нет ответов на этот вопрос</div>';
            }

            return `
                <div class="position-card">
                    <div class="position-header" onclick="togglePosition('${position}')">
                        <span class="position-title">${name}</span>
                        <span class="position-count">${users.length} чел.</span>
                    </div>
                    <div id="position-${position}" class="position-details">
                        ${answersHTML}
                        <button class="structure-btn" onclick="structurePosition('${position}')">📊 Структурировать для AI</button>
                    </div>
                </div>
            `;
        }

        function togglePosition(position) {
            const details = document.getElementById('position-' + position);
            if (details) {
                details.classList.toggle('visible');
            }
        }

        function structurePosition(position) {
            const details = document.getElementById('position-' + position);
            if (!details) return;

            const answers = details.querySelectorAll('.answer-item');
            let structuredData = 'Должность: ' + position + '\n\n';
            answers.forEach((item, index) => {
                structuredData += (index + 1) + '. ' + item.textContent + '\n';
            });

            // Copy to clipboard
            navigator.clipboard.writeText(structuredData).then(() => {
                alert('Данные скопированы в буфер обмена для отправки в AI');
            }).catch(err => {
                console.error('Error copying to clipboard:', err);
                prompt('Скопируйте данные для AI:', structuredData);
            });
        }

        // Make functions global
        window.switchTab = switchTab;
        window.loadProData = loadProData;
        window.renderPositionCard = renderPositionCard;
        window.togglePosition = togglePosition;
        window.structurePosition = structurePosition;
    </script>
</body>
</html>
